<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIN Crew Selector</title>
<style>
  /* High-contrast, dark-themed styling with mobile-optimized text */
  body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    margin: 0;
    padding: 50px 15px 20px 15px; 
    background-color: #121212;
    color: #ffffff;
    font-size: 18px;
  }

  /* Last Updated Text in Top Right Corner */
  .last-updated {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 12px;
    color: #888;
  }

  /* Mobile-First Dropdown Layout */
  .dropdown-container {
    display: flex;
    flex-direction: column; 
    align-items: stretch;
    gap: 20px;
    padding: 20px;
    background-color: #1e1e1e;
    border-radius: 12px;
    border: 1px solid #333;
    max-width: 500px;
    margin: 0 auto 20px auto;
  }

  /* Input Groups inside Container */
  .input-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start; 
    width: 100%;
  }

  label {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 16px;
    color: #ccc;
  }

  /* Wrapper to hold dropdown/input and toggle button side-by-side */
  .fin-wrapper {
    display: flex;
    width: 100%;
    gap: 10px;
  }

  /* Fat dropdowns and inputs for easy tapping */
  select, input[type="tel"] { 
    flex-grow: 1; 
    width: 100%;
    box-sizing: border-box;
    padding: 14px; 
    font-size: 18px; 
    background-color: #2c2c2c;
    color: #ffffff;
    border: 1px solid #555;
    border-radius: 8px;
  }
  
  select {
    appearance: none; 
  }

  /* Toggle Mode Button */
  #modeToggleBtn {
    background-color: #333;
    color: white;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 0 12px; 
    font-size: 34px; 
    line-height: 1; 
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
  }

  #modeToggleBtn:active {
    background-color: #555;
  }

  /* Crew Button Options (Replaces Dropdown) */
  .crew-options-container {
    display: flex;
    width: 100%;
    gap: 10px;
  }

  .crew-btn {
    flex: 1; /* Makes buttons take up equal space */
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    background-color: #2c2c2c;
    color: #ffffff;
    border: 1px solid #555;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s, border-color 0.2s;
  }

  .crew-btn.active {
    background-color: #4CAF50; /* Green highlight for selected */
    border-color: #4CAF50;
    color: #ffffff;
  }

  /* Image Display Container (Stacks multiple images now) */
  #imageContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px; 
  }

  img { 
    max-width: 100%; 
    border: 2px solid #444; 
    border-radius: 8px;
  }

  #info {
    margin-top: 5px; 
    font-weight: bold;
    font-size: 22px;
    color: #4CAF50;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>

<div class="last-updated">Last updated: May 21, 2026 (v 3.2)</div>

<div class="dropdown-container">
  
  <div class="input-group">
    <label>Aircraft FIN:</label>
    <div class="fin-wrapper">
      <select id="finDropdown" style="display: none;">
        <option value="">-- Select FIN --</option>
      </select>

      <input type="tel" id="finInput" list="finList" placeholder="Tap to type..." maxlength="3">
      <datalist id="finList"></datalist>

      <button id="modeToggleBtn" type="button" title="Toggle Mode">📋</button>
    </div>
  </div>

  <div class="input-group">
    <label>Crew Size:</label>
    <div id="crewOptionsContainer" class="crew-options-container">
      </div>
  </div>

  <div id="info"></div>
</div>

<div id="imageContainer">
  </div>
