<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIN Crew Selector</title>
<style>
  /* High-contrast, dark-themed styling with mobile-optimized text */
  body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    margin: 0;
    padding: 50px 15px 20px 15px; 
    background-color: #121212;
    color: #ffffff;
    font-size: 18px;
  }

  /* Last Updated Text in Top Right Corner */
  .last-updated {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 12px;
    color: #888;
  }

  /* Mobile-First Dropdown Layout */
  .dropdown-container {
    display: flex;
    flex-direction: column; 
    align-items: stretch;
    gap: 20px;
    padding: 20px;
    background-color: #1e1e1e;
    border-radius: 12px;
    border: 1px solid #333;
    max-width: 500px;
    margin: 0 auto 20px auto;
  }

  /* Input Groups inside Container */
  .input-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start; 
    width: 100%;
  }

  label {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 16px;
    color: #ccc;
  }

  /* Wrapper to hold dropdown/input and toggle button side-by-side */
  .fin-wrapper {
    display: flex;
    width: 100%;
    gap: 10px;
  }

  /* Fat dropdowns and inputs for easy tapping */
  select, input[type="tel"] { 
    flex-grow: 1; 
    width: 100%;
    box-sizing: border-box;
    padding: 14px; 
    font-size: 18px; 
    background-color: #2c2c2c;
    color: #ffffff;
    border: 1px solid #555;
    border-radius: 8px;
  }
  
  select {
    appearance: none; 
  }

  /* Toggle Mode Button */
  #modeToggleBtn {
    background-color: #333;
    color: white;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 0 12px; 
    font-size: 34px; 
    line-height: 1; 
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s;
  }

  #modeToggleBtn:active {
    background-color: #555;
  }

  /* Crew Button Options (Replaces Dropdown) */
  .crew-options-container {
    display: flex;
    width: 100%;
    gap: 10px;
  }

  .crew-btn {
    flex: 1; /* Makes buttons take up equal space */
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    background-color: #2c2c2c;
    color: #ffffff;
    border: 1px solid #555;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s, border-color 0.2s;
  }

  .crew-btn.active {
    background-color: #4CAF50; /* Green highlight for selected */
    border-color: #4CAF50;
    color: #ffffff;
  }

  /* Image Display Container (Stacks multiple images now) */
  #imageContainer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px; 
  }

  img { 
    max-width: 100%; 
    border: 2px solid #444; 
    border-radius: 8px;
  }

  #info {
    margin-top: 5px; 
    font-weight: bold;
    font-size: 22px;
    color: #4CAF50;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>

<div class="last-updated">Last updated: April 25, 2026 (v 2.1.4)</div>

<div class="dropdown-container">
  
  <div class="input-group">
    <label>Aircraft FIN:</label>
    <div class="fin-wrapper">
      <select id="finDropdown" style="display: none;">
        <option value="">-- Select FIN --</option>
      </select>

      <input type="tel" id="finInput" list="finList" placeholder="Tap to type..." maxlength="3">
      <datalist id="finList"></datalist>

      <button id="modeToggleBtn" type="button" title="Toggle Mode">📋</button>
    </div>
  </div>

  <div class="input-group">
    <label>Crew Size:</label>
    <div id="crewOptionsContainer" class="crew-options-container">
      </div>
  </div>

  <div id="info"></div>
</div>

<div id="imageContainer">
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  
  // =====================================================================
  // DATASET 1: AIRCRAFT CONFIGURATIONS
  // =====================================================================
  const aircraftData = {
    "320 L1": { pageNumber: 5, lavkit: 0, soap: 1 },
    "320 L2": { pageNumber: 7, lavkit: 0, soap: 1 },
    "320 L3": { pageNumber: 9, lavkit: 0, soap: 1 }, 
    "320 Dream Cabin Lite": { pageNumber: 11, lavkit: 0, soap: 1 },
    "320 Dream Cabin Lite (Alt)": { pageNumber: 11, lavkit: 1, soap: 0 }, 
    "320 Jetz": { pageNumber: 13, lavkit: 0, soap: 1 },
    "321 L2": { pageNumber: 15, lavkit: 0, soap: 1 },
    "321 Dream": { pageNumber: 17, lavkit: 0, soap: 1 },
    "321 Glowing Hearted": { pageNumber: 19, lavkit: 0, soap: 1 },
    "220": { pageNumber: 21, lavkit: 1, soap: 1 },
    "737-8 Max23": { pageNumber: 23, lavkit: 1, soap: 1 },
    "737-8 Max Uplift": { pageNumber: 25, lavkit: 1, soap: 1 },
    "R319": { pageNumber: 30, lavkit: 0, soap: 1 },
    "R320": { pageNumber: 32, lavkit: 0, soap: 1 },
    "R321": { pageNumber: 34, lavkit: 0, soap: 1 },
    "R737-8 Max": { pageNumber: 36, lavkit: 1, soap: 1 },
    "A330-300 Dream": { pageNumber: 38, lavkit: 1, soap: 0 },
    "A330-300 L2": { pageNumber: 50, lavkit: 1, soap: 1 },
    "787-8": { pageNumber: 62, lavkit: 1, soap: 0 },
    "787-9": { pageNumber: 74, lavkit: 1, soap: 0 },
    "777-200LR": { pageNumber: 98, lavkit: 1, soap: 1 },
    "777-300ER": { pageNumber: 110, lavkit: 1, soap: 1 },
    "777-300HD": { pageNumber: 122, lavkit: 1, soap: 1 },
    "777-300HD L2": { pageNumber: 134, lavkit: 1, soap: 1 }
  };

  // =====================================================================
  // DATASET 2: FIN GROUPING
  // =====================================================================
  const groupedFins = {
    "320 L1": [235, 236, 239, 240, 241, 401, 402, 405],
    "320 L2": [417, 418, 419, 420],
    "320 L3": [421, 422],
    "320 Dream Cabin Lite": [237, 242],
    "320 Dream Cabin Lite (Alt)": [238], 
    "320 Jetz": [225, 226, 232, 416],
    "321 L2": [465, 466, 467, 483, 484],
    "321 Dream": [451, 452, 453, 454, 455, 456, 457, 458, 459, 460, 461, 462, 463, 464, 473],
    "321 Glowing Hearted": [468],
    "220": [101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120, 121, 122, 123, 124, 125, 126, 127, 128, 129, 130, 131, 132, 133, 134, 135, 136, 137, 138, 139, 140, 141, 142],
    "737-8 Max23": [505, 506, 507, 508, 509, 510, 511, 512, 513, 514, 515, 516, 517, 518, 521, 522, 524, 525, 526, 527, 528, 529, 530, 531, 532, 533, 534, 535, 536, 537, 538, 539, 540, 541, 542, 543, 544, 545],
    "737-8 Max Uplift": [571, 573, 574, 575, 576, 577, 578],
    "R319": [255, 256, 257, 259, 262, 263, 272, 276, 277, 278, 279, 281, 283, 284, 286, 287, 290],
    "R320": [243, 244, 245, 246, 247],
    "R321": [469, 470, 471, 472, 474, 475, 476, 477, 478, 479, 480, 481, 482],
    "R737-8 Max": [501, 502, 503, 504, 519, 520, 523],
    "A330-300 Dream": [931, 932, 933, 934, 935, 936, 937, 938, 939, 941, 942, 943, 944, 945, 946, 947, 948],
    "A330-300 L2": [949, 950],
    "787-8": [801, 802, 803, 804, 805, 806, 807, 808],
    "787-9": [831, 832, 833, 834, 835, 836, 837, 838, 839, 840, 841, 842, 843, 844, 845, 846, 847, 848, 849, 850, 851, 852, 853, 854, 855, 856, 857, 858, 859, 860, 861, 862],
    "777-200LR": [701, 702, 703, 704, 705, 706],
    "777-300ER": [731, 732, 733, 734, 735, 736, 737, 738, 739, 740, 741, 742],
    "777-300HD": [743, 744, 747, 748, 749],
    "777-300HD L2": [745, 746]
  };

  const finDatabase = {};
  for (const [aircraftType, fins] of Object.entries(groupedFins)) {
      fins.forEach(fin => finDatabase[fin] = aircraftType);
  }

  // Element References
  const finDropdown = document.getElementById('finDropdown'); 
  const finInput = document.getElementById('finInput'); 
  const finList = document.getElementById('finList'); 
  const modeToggleBtn = document.getElementById('modeToggleBtn');
  const crewOptionsContainer = document.getElementById('crewOptionsContainer');
  const imageContainer = document.getElementById('imageContainer');
  const infoDiv = document.getElementById('info'); 

  // State Variables 
  let isTypingMode = true;

  // Toggle Between Dropdown and Input
  modeToggleBtn.addEventListener('click', () => {
    isTypingMode = !isTypingMode;

    if (isTypingMode) {
      finDropdown.style.display = 'none';
      finInput.style.display = 'block';
      modeToggleBtn.innerHTML = '📋'; 
      finInput.value = ''; 
      finInput.focus();
    } else {
      finInput.style.display = 'none';
      finDropdown.style.display = 'block';
      modeToggleBtn.innerHTML = '⌨️'; 
      finDropdown.value = finDatabase[finInput.value] ? finInput.value : ''; 
      populateCrewOptions(); 
    }
  });

  // Helper function to get whichever FIN value is currently active
  function getActiveFinValue() {
    return isTypingMode ? finInput.value : finDropdown.value;
  }

  // Populate FIN options into BOTH the select and the datalist
  function populateFinOptions() {
    finDropdown.innerHTML = '<option value="">-- Select FIN --</option>';
    finList.innerHTML = ''; 
    finInput.value = ''; 
    
    const allFins = Object.keys(finDatabase)
      .map(Number)
      .sort((a, b) => a - b); 

    allFins.forEach(fin => {
        const optSelect = document.createElement('option');
        optSelect.value = fin;
        optSelect.textContent = fin;
        finDropdown.appendChild(optSelect);

        const optList = document.createElement('option');
        optList.value = fin;
        finList.appendChild(optList);
    });
  }

  // Generate Crew Buttons
  function populateCrewOptions() {
    crewOptionsContainer.innerHTML = ''; // Clear old buttons
    
    const typedFin = getActiveFinValue();
    if (!typedFin || !finDatabase[typedFin]) {
        // If invalid FIN, clear images and return
        imageContainer.innerHTML = '';
        infoDiv.textContent = '';
        return;
    }

    const isNarrowBody = parseInt(typedFin, 10) < 700;
    let optionsToRender = [];

    if (isNarrowBody) {
      optionsToRender = [
        { label: "1", offsets: [0] },
        { label: "2", offsets: [1] }
      ];
    } else { 
      optionsToRender = [
        { label: "2", offsets: [0, 1, 2] },
        { label: "3", offsets: [3, 4, 5, 6] },
        { label: "4", offsets: [7, 8, 9, 10, 11] }
      ];
    }

    // Create a button for each option (None are active by default now)
    optionsToRender.forEach((optData) => {
        const btn = document.createElement('button');
        btn.className = 'crew-btn';
        btn.textContent = optData.label;
        btn.dataset.offsets = JSON.stringify(optData.offsets);

        // When clicked, assign the active class and update images
        btn.addEventListener('click', function() {
            document.querySelectorAll('.crew-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            updateImage();
        });

        crewOptionsContainer.appendChild(btn);
    });

    updateImage(); // Run updateImage (will safely clear images since no button is active)
  }

  // Update Image Logic
  function updateImage() {
    // Always clear the container and info block first
    imageContainer.innerHTML = '';
    infoDiv.textContent = '';

    const typedFin = getActiveFinValue();
    const activeBtn = document.querySelector('.crew-btn.active');
    
    // Stop here if FIN is invalid OR if a crew button hasn't been clicked yet
    if (!typedFin || !activeBtn || !finDatabase[typedFin]) return;

    const crewValue = activeBtn.dataset.offsets; 
    const aircraftType = finDatabase[typedFin];
    const info = aircraftData[aircraftType];
    const basePage = parseInt(info.pageNumber, 10);
    const offsets = JSON.parse(crewValue); 

    // Loop through the offsets and create an image tag for each one
    offsets.forEach(offset => {
      const finalPage = basePage + parseInt(offset, 10);
      const filename = "PG" + finalPage.toString().padStart(4, "0") + ".jpeg";
      
      const imgElement = document.createElement('img');
      imgElement.src = filename;
      imgElement.alt = `Selected Page ${finalPage}`;
      imageContainer.appendChild(imgElement);
    });

    infoDiv.textContent = `Lav Kit: ${info.lavkit === 1 ? 'T' : 'S'} | Soap: ${info.soap === 1 ? 'T' : 'S'}`;
  }

  // Event Listeners
  finDropdown.addEventListener('change', populateCrewOptions);
  finInput.addEventListener('input', populateCrewOptions); 

  // Clear the input box when the user taps on it
  finInput.addEventListener('focus', function() {
    this.value = ''; 
    populateCrewOptions(); 
  });

  // Initialize
  populateFinOptions();
});
</script>

</body>
</html>
