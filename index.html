<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Crucial for mobile scaling -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIN Crew Selector</title>
<style>
  /* High-contrast, dark-themed styling with mobile-optimized text */
  body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    margin: 0;
    padding: 50px 15px 20px 15px; /* Added padding to clear the top-right date */
    background-color: #121212;
    color: #ffffff;
    font-size: 18px;
  }

  /* Last Updated Text in Top Right Corner */
  .last-updated {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 12px;
    color: #888;
  }

  /* Mobile-First Dropdown Layout (Vertical Stacking) */
  .dropdown-container {
    display: flex;
    flex-direction: column; /* Stack elements vertically for thumbs */
    align-items: stretch;
    gap: 20px;
    padding: 20px;
    background-color: #1e1e1e;
    border-radius: 12px;
    border: 1px solid #333;
    max-width: 500px;
    margin: 0 auto 20px auto;
  }

  /* Keep the switch horizontal and centered */
  .switch-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }

  .switch-label {
    font-weight: bold;
    font-size: 18px;
  }

  /* Switch Styling */
  .switch {
    position: relative;
    display: inline-block;
    width: 60px;
    height: 34px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #555;
    transition: 0.4s;
    border-radius: 34px;
  }

  .slider:before {
    position: absolute;
    content: "";
    height: 26px;
    width: 26px;
    left: 4px;
    bottom: 4px;
    background-color: white;
    transition: 0.4s;
    border-radius: 50%;
  }

  input:checked + .slider {
    background-color: #4CAF50;
  }

  input:checked + .slider:before {
    transform: translateX(26px);
  }

  /* Input Groups inside Container */
  .input-group {
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* Align label to left */
    width: 100%;
  }

  label {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 16px;
    color: #ccc;
  }

  /* Fat dropdowns for easy tapping */
  select { 
    width: 100%; /* Full width */
    box-sizing: border-box;
    padding: 14px; 
    font-size: 18px; 
    background-color: #2c2c2c;
    color: #ffffff;
    border: 1px solid #555;
    border-radius: 8px;
    appearance: none; /* Removes default OS styling for a cleaner look */
  }

  /* Image Display */
  img { 
    max-width: 100%; 
    border: 2px solid #444; 
    border-radius: 8px;
    margin-top: 10px; 
  }

  #info {
    margin-top: 5px; 
    font-weight: bold;
    font-size: 22px;
    color: #4CAF50;
    text-align: center;
    width: 100%;
  }
</style>
</head>
<body>

<!-- Update this date whenever you modify the arrays -->
<div class="last-updated">Last updated: April 17, 2026 (v 2.0)</div>

<div class="dropdown-container">
  <!-- Narrow/Wide Switch -->
  <div class="switch-container">
    <span class="switch-label">Narrow</span>
    <label class="switch">
      <input type="checkbox" id="modeSwitch">
      <span class="slider"></span>
    </label>
    <span class="switch-label">Wide</span>
  </div>

  <!-- FIN Dropdown -->
  <div class="input-group">
    <label for="finDropdown">Aircraft FIN:</label>
    <select id="finDropdown">
      <option value="">-- Select FIN --</option>
    </select>
  </div>

  <!-- Crew Dropdown -->
  <div class="input-group">
    <label for="crewDropdown">Crew Size:</label>
    <select id="crewDropdown">
      <option value="">-- Select Crew --</option>
    </select>
  </div>

  <div id="info"></div>
</div>

<!-- Image Display -->
<div>
  <img id="fullscreenImage" src="PG0001.jpeg" alt="Selected Page">
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  
  // =====================================================================
  // DATASET 1: AIRCRAFT CONFIGURATIONS
  // IF THE PDF UPDATES, YOU ONLY NEED TO CHANGE THE "pageNumber" HERE.
  // =====================================================================
  const aircraftData = {
    "320 L1": { pageNumber: 5, lavkit: 0, soap: 1 },
    "320 L2": { pageNumber: 7, lavkit: 0, soap: 1 },
    "320 L3": { pageNumber: 9, lavkit: 0, soap: 1 }, 
    "320 Dream Cabin Lite": { pageNumber: 11, lavkit: 0, soap: 1 },
    "320 Dream Cabin Lite (Alt)": { pageNumber: 11, lavkit: 1, soap: 0 }, 
    "320 Jetz": { pageNumber: 13, lavkit: 0, soap: 1 },
    "321 L2": { pageNumber: 15, lavkit: 0, soap: 1 },
    "321 Dream": { pageNumber: 17, lavkit: 0, soap: 1 },
    "321 Glowing Hearted": { pageNumber: 19, lavkit: 0, soap: 1 },
    "220": { pageNumber: 21, lavkit: 1, soap: 1 },
    "737-8 Max23": { pageNumber: 23, lavkit: 1, soap: 1 },
    "737-8 Max Uplift": { pageNumber: 25, lavkit: 1, soap: 1 },
    "R319": { pageNumber: 30, lavkit: 0, soap: 1 },
    "R320": { pageNumber: 32, lavkit: 0, soap: 1 },
    "R321": { pageNumber: 34, lavkit: 0, soap: 1 },
    "R737-8 Max": { pageNumber: 36, lavkit: 1, soap: 1 },
    "A330-300 Dream": { pageNumber: 38, lavkit: 1, soap: 0 },
    "A330-300 L2": { pageNumber: 50, lavkit: 1, soap: 1 },
    "787-8": { pageNumber: 62, lavkit: 1, soap: 0 },
    "787-9": { pageNumber: 74, lavkit: 1, soap: 0 },
    "777-200LR": { pageNumber: 98, lavkit: 1, soap: 1 },
    "777-300ER": { pageNumber: 110, lavkit: 1, soap: 1 },
    "777-300HD": { pageNumber: 122, lavkit: 1, soap: 1 },
    "777-300HD L2": { pageNumber: 134, lavkit: 1, soap: 1 }
  };

  // =====================================================================
  // DATASET 2: FIN GROUPING
  // Add new planes to the arrays below. The code will auto-map them!
  // =====================================================================
  const groupedFins = {
    "320 L1": [235, 236, 239, 240, 241, 401, 402, 405],
    "320 L2": [417, 418, 419, 420],
    "320 L3": [421, 422],
    "320 Dream Cabin Lite": [237, 242],
    "320 Dream Cabin Lite (Alt)": [238], 
    "320 Jetz": [225, 226, 232, 416],
    "321 L2": [465, 466, 467, 483, 484],
    "321 Dream": [451, 452, 453, 454, 455, 456, 457, 458, 459, 460, 461, 462, 463, 464, 473],
    "321 Glowing Hearted": [468],
    "220": [101, 102, 103, 104, 105, 106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120, 121, 122, 123, 124, 125, 126, 127, 128, 129, 130, 131, 132, 133, 134, 135, 136, 137, 138, 139, 140, 141, 142],
    "737-8 Max23": [505, 506, 507, 508, 509, 510, 511, 512, 513, 514, 515, 516, 517, 518, 521, 522, 524, 525, 526, 527, 528, 529, 530, 531, 532, 533, 534, 535, 536, 537, 538, 539, 540, 541, 542, 543, 544, 545],
    "737-8 Max Uplift": [571, 573, 574, 575, 576, 577, 578],
    "R319": [255, 256, 257, 259, 262, 263, 272, 276, 277, 278, 279, 281, 283, 284, 286, 287, 290],
    "R320": [243, 244, 245, 246, 247],
    "R321": [469, 470, 471, 472, 474, 475, 476, 477, 478, 479, 480, 481, 482],
    "R737-8 Max": [501, 502, 503, 504, 519, 520, 523],
    "A330-300 Dream": [931, 932, 933, 934, 935, 936, 937, 938, 939, 941, 942, 943, 944, 945, 946, 947, 948],
    "A330-300 L2": [949, 950],
    "787-8": [801, 802, 803, 804, 805, 806, 807, 808],
    "787-9": [831, 832, 833, 834, 835, 836, 837, 838, 839, 840, 841, 842, 843, 844, 845, 846, 847, 848, 849, 850, 851, 852, 853, 854, 855, 856, 857, 858, 859, 860, 861, 862],
    "777-200LR": [701, 702, 703, 704, 705, 706],
    "777-300ER": [731, 732, 733, 734, 735, 736, 737, 738, 739, 740, 741, 742],
    "777-300HD": [743, 744, 747, 748, 749],
    "777-300HD L2": [745, 746]
  };

  // Automatically unpack the grouped data into a flat database for fast searching
  const finDatabase = {};
  for (const [aircraftType, fins] of Object.entries(groupedFins)) {
      fins.forEach(fin => {
          finDatabase[fin] = aircraftType;
      });
  }

  const modeSwitch = document.getElementById('modeSwitch');
  const finDropdown = document.getElementById('finDropdown');
  const crewDropdown = document.getElementById('crewDropdown');
  const fullscreenImage = document.getElementById('fullscreenImage');
  const infoDiv = document.getElementById('info'); 

  let currentMode = "Narrow";

  // Populate FIN options dynamically
  function populateFinOptions() {
    finDropdown.innerHTML = '<option value="">-- Select FIN --</option>';
    
    const validFins = Object.keys(finDatabase)
      .map(Number)
      .filter(fin => (currentMode === "Narrow" && fin < 700) || (currentMode === "Wide" && fin >= 700))
      .sort((a, b) => a - b); 

    validFins.forEach(fin => {
      const aircraftType = finDatabase[fin];
      const info = aircraftData[aircraftType];

      if (info) {
        const option = document.createElement('option');
        option.value = fin;
        option.textContent = fin;
        
        option.dataset.pageNumber = info.pageNumber;
        option.dataset.lavkit = info.lavkit;
        option.dataset.soap = info.soap;
        
        finDropdown.appendChild(option);
      }
    });
  }

  // Populate Crew options
  function populateCrewOptions() {
    crewDropdown.innerHTML = '<option value="">-- Select Crew --</option>';
    if (!finDropdown.value) return;

    if (currentMode === "Narrow") {
      ["1", "2"].forEach((label, index) => {
        const opt = document.createElement('option');
        opt.value = index; 
        opt.textContent = label;
        crewDropdown.appendChild(opt);
      });
      crewDropdown.value = 1; // Narrow default

    } else { // Wide
      const wideOptions = [
        "Crew 2","1/2","2/2",
        "Crew 3","1/3","2/3","3/3",
        "Crew 4","1/4","2/4","3/4","4/4"
      ];
      wideOptions.forEach((label, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        opt.textContent = label;
        crewDropdown.appendChild(opt);
      });
      crewDropdown.value = 7; // Wide default
    }

    updateImage();
  }

  // Update Image Logic
  function updateImage() {
    const finOption = finDropdown.selectedOptions[0];
    const crewIndex = crewDropdown.value;
    
    if (!finOption || crewIndex === "") return;

    const basePage = parseInt(finOption.dataset.pageNumber, 10);
    const finalPage = basePage + parseInt(crewIndex, 10);
    
    const filename = "PG" + finalPage.toString().padStart(4, "0") + ".jpeg";
    fullscreenImage.src = filename;

    infoDiv.textContent = `Lav Kit: ${finOption.dataset.lavkit === "1" ? 'T' : 'S'} | Soap: ${finOption.dataset.soap === "1" ? 'T' : 'S'}`;
  }

  // Event Listeners
  modeSwitch.addEventListener('change', () => {
    currentMode = modeSwitch.checked ? "Wide" : "Narrow";
    populateFinOptions();
    crewDropdown.innerHTML = '<option value="">-- Select Crew --</option>';
    fullscreenImage.src = "PG0001.jpeg";
    infoDiv.textContent = '';
  });

  finDropdown.addEventListener('change', populateCrewOptions);
  crewDropdown.addEventListener('change', updateImage);

  // Initialize the list on page load
  populateFinOptions();
});
</script>

</body>
</html>
